name: Build, Publish and Deploy

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Docker tag"
        required: true
        default: "v0.0.0"

permissions:
  contents: read
  deployments: write
  packages: write

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  prepare:
    name: Prepare
    runs-on: ubuntu-latest
    if: github.repository == 'ShadowArcanist/gitbase'
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
      image: ${{ steps.refs.outputs.image }}
    steps:
      - name: Resolve tag
        id: tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.tag }}"
          else
            TAG="${{ github.event.release.tag_name }}"
          fi
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Prepare image reference
        id: refs
        shell: bash
        run: |
          echo "image=ghcr.io/shadowarcanist/gitbase" >> "$GITHUB_OUTPUT"

  build-push:
    name: Build ${{ matrix.arch }}
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
            runner: ubuntu-24.04
          - arch: arm64
            platform: linux/arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: ${{ matrix.platform }}
          tags: |
            ${{ needs.prepare.outputs.image }}:${{ needs.prepare.outputs.tag }}-${{ matrix.arch }}
            ${{ needs.prepare.outputs.image }}:latest-${{ matrix.arch }}
          cache-from: type=gha,scope=${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=${{ matrix.arch }}

  merge-manifest-and-deploy:
    name: Merge Manifest and Deploy
    needs:
      - prepare
      - build-push
    runs-on: ubuntu-24.04
    env:
      APP_NAME: gitbase
      DEPLOY_ENVIRONMENT: Production
      WATCHD_URL: ${{ secrets.WATCHD_URL }}
      WATCHD_SHARED_SECRET: ${{ secrets.WATCHD_SHARED_SECRET }}
      PRODUCTION_URL: ${{ vars.PRODUCTION_URL }}
      IMAGE: ${{ needs.prepare.outputs.image }}:latest
      RELEASE_VERSION: ${{ needs.prepare.outputs.tag }}
      WEBHOOK_RETRY_ATTEMPTS: "40"
      WEBHOOK_RETRY_DELAY_SECONDS: "15"

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and publish multi-arch manifest
        id: manifest
        shell: bash
        run: |
          docker buildx imagetools create \
            "${{ needs.prepare.outputs.image }}:${RELEASE_VERSION}-amd64" \
            "${{ needs.prepare.outputs.image }}:${RELEASE_VERSION}-arm64" \
            --tag "${{ needs.prepare.outputs.image }}:${RELEASE_VERSION}" \
            --tag "${IMAGE}"

          DIGEST="$(docker buildx imagetools inspect "${IMAGE}" --format '{{json .Manifest.Digest}}' | tr -d '"')"
          echo "digest=${DIGEST}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub deployment object
        id: deployment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          python3 - <<'PY' > deployment-request.json
          import json
          import os
          import sys

          payload = {
              "ref": os.environ["GITHUB_SHA"],
              "environment": os.environ["DEPLOY_ENVIRONMENT"],
              "auto_merge": False,
              "required_contexts": [],
              "description": "Deployment requested by GitHub Actions",
          }
          sys.stdout.write(json.dumps(payload, separators=(",", ":")))
          PY

          curl -fsSL \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            --data-binary @deployment-request.json \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/deployments" \
            > deployment-response.json

          DEPLOYMENT_ID="$(python3 - <<'PY'
          import json
          with open("deployment-response.json", "r", encoding="utf-8") as handle:
              print(json.load(handle)["id"])
          PY
          )"
          echo "deployment_id=${DEPLOYMENT_ID}" >> "$GITHUB_OUTPUT"

      - name: Send deploy webhook to watchd
        env:
          DEPLOYMENT_ID: ${{ steps.deployment.outputs.deployment_id }}
          IMAGE_DIGEST: ${{ steps.manifest.outputs.digest }}
          GITHUB_RUN_ID_VALUE: ${{ github.run_id }}
        shell: bash
        run: |
          export WATCHD_URL
          WATCHD_PATH="$(python3 - <<'PY'
          import os
          from urllib.parse import urlparse

          parsed = urlparse(os.environ["WATCHD_URL"])
          path = parsed.path or "/"
          print(path)
          PY
          )"
          EVENT_ID="$(uuidgen | tr '[:upper:]' '[:lower:]')"
          export EVENT_ID

          python3 - <<'PY' > payload.json
          import json
          import os
          import sys

          payload = {
              "app_name": os.environ["APP_NAME"],
              "source_sha": os.environ["GITHUB_SHA"],
              "version": os.environ["RELEASE_VERSION"],
              "image": os.environ["IMAGE"],
              "image_digest": os.environ["IMAGE_DIGEST"],
              "event_id": os.environ["EVENT_ID"],
              "github": {
                  "repository": os.environ["GITHUB_REPOSITORY"],
                  "deployment_id": int(os.environ["DEPLOYMENT_ID"]),
                  "environment": os.environ["DEPLOY_ENVIRONMENT"],
                  "run_url": f'{os.environ["GITHUB_SERVER_URL"]}/{os.environ["GITHUB_REPOSITORY"]}/actions/runs/{os.environ["GITHUB_RUN_ID"]}',
              },
          }

          production_url = os.environ.get("PRODUCTION_URL", "").strip()
          if production_url:
              payload["github"]["environment_url"] = production_url

          if os.environ["GITHUB_EVENT_NAME"] == "workflow_dispatch":
              payload["version"] = f'{os.environ["RELEASE_VERSION"]}+manual.{os.environ["GITHUB_RUN_ID_VALUE"]}'
              payload.pop("source_sha", None)
              payload.pop("image_digest", None)

          sys.stdout.write(json.dumps(payload, separators=(",", ":")))
          PY

          BODY="$(cat payload.json)"

          attempt=1
          while [ "${attempt}" -le "${WEBHOOK_RETRY_ATTEMPTS}" ]; do
            TIMESTAMP="$(date +%s)"
            NONCE="$(uuidgen | tr '[:upper:]' '[:lower:]')"
            CANONICAL="$(printf 'POST\n%s\n%s\n%s\n%s' \
              "${WATCHD_PATH}" \
              "${TIMESTAMP}" \
              "${NONCE}" \
              "${BODY}")"
            SIGNATURE="sha256=$(printf '%s' "${CANONICAL}" | openssl dgst -sha256 -hmac "${WATCHD_SHARED_SECRET}" -hex | sed 's/^.* //')"

            HTTP_STATUS="$(curl -sS \
              -o webhook-response.txt \
              -w '%{http_code}' \
              -X POST \
              -H "Content-Type: application/json" \
              -H "X-Deploy-Timestamp: ${TIMESTAMP}" \
              -H "X-Deploy-Nonce: ${NONCE}" \
              -H "X-Deploy-Signature: ${SIGNATURE}" \
              --data-binary @payload.json \
              "${WATCHD_URL}")"

            if [ "${HTTP_STATUS}" = "202" ] || [ "${HTTP_STATUS}" = "200" ]; then
              echo "watchd accepted deploy request with status ${HTTP_STATUS}"
              exit 0
            fi

            if [ "${HTTP_STATUS}" = "409" ] && [ "${attempt}" -lt "${WEBHOOK_RETRY_ATTEMPTS}" ]; then
              echo "watchd busy for ${APP_NAME}, retrying in ${WEBHOOK_RETRY_DELAY_SECONDS}s (attempt ${attempt}/${WEBHOOK_RETRY_ATTEMPTS})"
              sleep "${WEBHOOK_RETRY_DELAY_SECONDS}"
              attempt=$((attempt + 1))
              continue
            fi

            echo "watchd request failed with status ${HTTP_STATUS}"
            cat webhook-response.txt
            exit 1
          done

          echo "watchd remained busy for ${APP_NAME} after ${WEBHOOK_RETRY_ATTEMPTS} attempts"
          exit 1
